<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body data-pc-header="header-1" data-pc-preset="preset-1" data-pc-sidebar-theme="light" data-pc-sidebar-caption="true" data-pc-direction="ltr" data-pc-theme="light">
<div th:replace="~{fragments/sidebar :: sidebar(${activeNav}, ${currentUser})}"></div>
<div th:replace="~{fragments/topbar :: topbar(${currentUser})}"></div>
<div class="pc-container"><div class="pc-content">
    <div class="d-flex justify-content-between align-items-center mb-4"><h4 class="mb-0">Produk Kain</h4><a th:href="@{/products/new}" class="btn btn-primary">Tambah Produk</a></div>
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="card"><div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover mb-0 js-datatable"
               data-dt-order='[[0, "asc"]]'>
            <thead><tr><th>Nama</th><th>Kategori</th><th class="dt-nosort">Harga / Stok per Satuan</th><th class="dt-nosort text-end">Aksi</th></tr></thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.name}">Nama</td>
                <td th:text="${product.category.name}">Kategori</td>
                <td>
                    <div th:each="value : ${product.unitValues}" class="small">
                        <strong th:text="${value.unitType.label}">meter</strong>:
                        <span th:text="${@money.format(value.salePrice)}">Rp0</span>,
                        stok <span th:text="${value.stockQuantity}">0</span>
                    </div>
                </td>
                <td class="text-end">
                    <a th:href="@{|/products/${product.id}/edit|}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <form th:action="@{|/products/${product.id}/delete|}" method="post" class="d-inline js-confirm-submit"
                          data-confirm-title="Hapus produk?"
                          data-confirm-text="Produk yang dipilih akan dihapus permanen."
                          data-confirm-confirm-text="Ya, hapus"
                          data-confirm-cancel-text="Batal"><input th:replace="~{fragments/csrf :: token}" /><button type="submit" class="btn btn-sm btn-outline-danger">Hapus</button></form>
                </td>
            </tr>
            </tbody>
        </table>
    </div></div></div>
</div></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
