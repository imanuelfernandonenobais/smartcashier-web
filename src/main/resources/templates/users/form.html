<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body data-pc-header="header-1" data-pc-preset="preset-1" data-pc-sidebar-theme="light" data-pc-sidebar-caption="true" data-pc-direction="ltr" data-pc-theme="light">
<div th:replace="~{fragments/sidebar :: sidebar(${activeNav}, ${currentUser})}"></div>
<div th:replace="~{fragments/topbar :: topbar(${currentUser})}"></div>
<div class="pc-container"><div class="pc-content">
    <div class="card"><div class="card-body">
        <h4 class="mb-4" th:text="${pageTitle}">Form User</h4>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form th:object="${userForm}" th:action="${userId != null} ? @{|/users/${userId}|} : @{/users}" method="post">
            <input th:replace="~{fragments/csrf :: token}" />
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">Nama Lengkap</label><input th:field="*{fullName}" class="form-control" /><div class="text-danger small" th:errors="*{fullName}"></div></div>
                <div class="col-md-6 mb-3"><label class="form-label">Username</label><input th:field="*{username}" class="form-control" /><div class="text-danger small" th:errors="*{username}"></div></div>
                <div class="col-md-6 mb-3"><label class="form-label">Password <span class="text-muted small" th:if="${userId != null}">(kosongkan jika tidak diubah)</span></label><input th:field="*{password}" type="password" class="form-control" /><div class="text-danger small" th:errors="*{password}"></div></div>
                <div class="col-md-3 mb-3"><label class="form-label">Role</label><select th:field="*{role}" class="form-select"><option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option></select></div>
                <div class="col-md-3 mb-3"><label class="form-label">Status</label><select th:field="*{enabled}" class="form-select"><option th:value="true">Aktif</option><option th:value="false">Nonaktif</option></select></div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a th:href="@{/users}" class="btn btn-light">Batal</a>
            </div>
        </form>
    </div></div>
</div></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
