<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body data-pc-header="header-1" data-pc-preset="preset-1" data-pc-sidebar-theme="light" data-pc-sidebar-caption="true" data-pc-direction="ltr" data-pc-theme="light">
<div th:replace="~{fragments/sidebar :: sidebar(${activeNav}, ${currentUser})}"></div>
<div th:replace="~{fragments/topbar :: topbar(${currentUser})}"></div>
<div class="pc-container"><div class="pc-content">
    <div class="card"><div class="card-body">
        <h4 class="mb-4" th:text="${pageTitle}">Form Kategori</h4>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form th:object="${categoryForm}" th:action="${categoryId != null} ? @{|/categories/${categoryId}|} : @{/categories}" method="post">
            <input th:replace="~{fragments/csrf :: token}" />
            <div class="mb-3"><label class="form-label">Nama Kategori</label><input th:field="*{name}" class="form-control" /><div class="text-danger small" th:errors="*{name}"></div></div>
            <div class="d-flex gap-2"><button type="submit" class="btn btn-primary">Simpan</button><a th:href="@{/categories}" class="btn btn-light">Batal</a></div>
        </form>
    </div></div>
</div></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
