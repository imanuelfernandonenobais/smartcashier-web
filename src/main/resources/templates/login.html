<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body data-pc-header="header-1" data-pc-preset="preset-1" data-pc-sidebar-theme="light" data-pc-sidebar-caption="true" data-pc-direction="ltr" data-pc-theme="light">
<div class="loader-bg">
    <div class="loader-track"><div class="loader-fill"></div></div>
</div>

<div class="auth-main v1 bg-grd-primary">
    <div class="auth-wrapper">
        <div class="auth-form">
            <div class="card my-5">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <img th:src="@{/assets/images/logo-dark.svg}" alt="logo" class="img-fluid mb-3" />
                        <h4 class="f-w-500 mb-1">SmartCashier Login</h4>
                        <p class="mb-0 text-muted">Masuk ke dashboard kasir berbasis MVC.</p>
                    </div>

                    <div class="alert alert-danger" th:if="${param.error}">Username atau password salah.</div>
                    <div class="alert alert-success" th:if="${param.logout}">Anda berhasil logout.</div>

                    <form th:action="@{/login}" method="post">
                        <input th:replace="~{fragments/csrf :: token}" />
                        <div class="form-group mb-3">
                            <input type="text" class="form-control" name="username" placeholder="Username" required autofocus />
                        </div>
                        <div class="form-group mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Password" required />
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>
                    </form>

                    <!-- <div class="mt-4 p-3 bg-light rounded">
                        <small class="text-muted d-block">Initial admin account</small>
                        <strong>admin / admin123</strong>
                    </div> -->
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
